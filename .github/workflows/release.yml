name: Release
on:
  push:
    branches: [main]

concurrency: release

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./
        id: version
        with:
          prefix: 'v'
          tag: 'true'
      - name: Stamp VERSION and publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.version }}
          VERSION_DATE: ${{ steps.version.outputs.date }}
          VERSION_COUNT: ${{ steps.version.outputs.count }}
        run: |
          tag="$TAG"
          version="${VERSION_DATE}.${VERSION_COUNT}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists, skipping"
            exit 0
          fi
          sed -i 's|^VERSION=""$|VERSION="'"$version"'"|' gitcalver.sh
          actual=$(./gitcalver.sh --version)
          [ "$actual" = "gitcalver $version" ] \
            || { echo "Stamp verification failed: $actual" >&2; exit 1; }
          gh release create "$tag" gitcalver.sh \
            --title "$version" \
            --notes "gitcalver.sh $version" \
            --latest
