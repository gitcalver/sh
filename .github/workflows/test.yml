name: Test
on: [push, pull_request]

jobs:
  test-script:
    # Newest and oldest non-EOL version of each Unix OS with a GitHub Actions runner.
    strategy:
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-22.04
          - macos-26
          - macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: make test-local

  test-docker:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: make test-docker

  # Uses branch override so tests pass on non-default branches.
  test-action:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./
        id: version
        with:
          branch: ${{ github.head_ref || github.ref_name }}
      - run: |
          echo "version=${{ steps.version.outputs.version }}"
          echo "date=${{ steps.version.outputs.date }}"
          echo "count=${{ steps.version.outputs.count }}"
          echo "dirty=${{ steps.version.outputs.dirty }}"
          echo "hash=${{ steps.version.outputs.hash }}"
          echo "${{ steps.version.outputs.version }}" | grep -qE '^[0-9]{8}\.[0-9]+$'
          echo "${{ steps.version.outputs.date }}" | grep -qE '^[0-9]{8}$'
          echo "${{ steps.version.outputs.count }}" | grep -qE '^[0-9]+$'
          [[ "${{ steps.version.outputs.dirty }}" == "false" ]]
          echo "${{ steps.version.outputs.hash }}" | grep -qE '^[0-9a-f]+$'
      - uses: ./
        id: semver
        with:
          prefix: '0.'
          branch: ${{ github.head_ref || github.ref_name }}
      - uses: ./
        id: go
        with:
          prefix: 'v0.'
          branch: ${{ github.head_ref || github.ref_name }}
      - run: |
          echo "${{ steps.semver.outputs.version }}" | grep -qE '^0\.[0-9]{8}\.[0-9]+$'
          echo "${{ steps.go.outputs.version }}" | grep -qE '^v0\.[0-9]{8}\.[0-9]+$'
      - run: echo dirty > untracked.txt
      - uses: ./
        id: dirty
        with:
          dirty: '-dirty'
          branch: ${{ github.head_ref || github.ref_name }}
      - run: |
          [[ "${{ steps.dirty.outputs.dirty }}" == "true" ]]
          echo "${{ steps.dirty.outputs.version }}" | grep -qE '^[0-9]{8}\.[0-9]+-dirty\.[0-9a-f]+$'
      - uses: ./
        id: nohash
        with:
          dirty: '-dirty'
          dirty-hash: 'false'
          branch: ${{ github.head_ref || github.ref_name }}
      - run: |
          echo "${{ steps.nohash.outputs.version }}" | grep -qE '^[0-9]{8}\.[0-9]+-dirty$'
