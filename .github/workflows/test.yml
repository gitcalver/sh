name: Test
on: [push, pull_request]

jobs:
  test-script:
    # Newest and oldest non-EOL version of each Unix OS with a GitHub Actions runner.
    strategy:
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-22.04
          - macos-26
          - macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - run: ./test/test.sh
