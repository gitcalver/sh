name: Test
on: [push, pull_request]

jobs:
  test-script:
    # Newest and oldest non-EOL version of each Unix OS with a GitHub Actions runner.
    strategy:
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-22.04
          - macos-26
          - macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: make test-local

  test-docker:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: make test-docker

  # Uses branch override so tests pass on non-default branches.
  test-action:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./
        id: version
        with:
          branch: ${{ github.head_ref || github.ref_name }}
      - env:
          VERSION: ${{ steps.version.outputs.version }}
          DATE: ${{ steps.version.outputs.date }}
          COUNT: ${{ steps.version.outputs.count }}
          DIRTY: ${{ steps.version.outputs.dirty }}
          HASH: ${{ steps.version.outputs.hash }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          echo "version=$VERSION"
          echo "date=$DATE"
          echo "count=$COUNT"
          echo "dirty=$DIRTY"
          echo "hash=$HASH"
          echo "tag=$TAG"
          echo "$VERSION" | grep -qE '^[0-9]{8}\.[0-9]+$'
          echo "$DATE" | grep -qE '^[0-9]{8}$'
          echo "$COUNT" | grep -qE '^[0-9]+$'
          [[ "$DIRTY" == "false" ]]
          echo "$HASH" | grep -qE '^[0-9a-f]{7}$'
          [[ "$TAG" == "$VERSION" ]]
      - uses: ./
        id: semver
        with:
          prefix: '0.'
          tag-prefix: 'release/v'
          remote: origin
          branch: ${{ github.head_ref || github.ref_name }}
      - uses: ./
        id: go
        with:
          prefix: 'v0.'
          branch: ${{ github.head_ref || github.ref_name }}
      - env:
          SEMVER_VERSION: ${{ steps.semver.outputs.version }}
          SEMVER_TAG: ${{ steps.semver.outputs.tag }}
          GO_VERSION: ${{ steps.go.outputs.version }}
        run: |
          echo "$SEMVER_VERSION" | grep -qE '^0\.[0-9]{8}\.[0-9]+$'
          [[ "$SEMVER_TAG" == "release/v$SEMVER_VERSION" ]]
          echo "$GO_VERSION" | grep -qE '^v0\.[0-9]{8}\.[0-9]+$'
      - run: echo dirty > untracked.txt
      - uses: ./
        id: dirty
        with:
          dirty: '-dirty'
          branch: ${{ github.head_ref || github.ref_name }}
      - env:
          DIRTY: ${{ steps.dirty.outputs.dirty }}
          VERSION: ${{ steps.dirty.outputs.version }}
        run: |
          [[ "$DIRTY" == "true" ]]
          echo "$VERSION" | grep -qE '^[0-9]{8}\.[0-9]+-dirty\.[0-9a-f]+$'
      - uses: ./
        id: nohash
        with:
          dirty: '-dirty'
          dirty-hash: 'false'
          branch: ${{ github.head_ref || github.ref_name }}
      - env:
          VERSION: ${{ steps.nohash.outputs.version }}
        run: |
          echo "$VERSION" | grep -qE '^[0-9]{8}\.[0-9]+-dirty$'
      - uses: ./
        id: dirty-tag
        continue-on-error: true
        with:
          dirty: '-dirty'
          branch: ${{ github.head_ref || github.ref_name }}
          tag: 'true'
      - env:
          OUTCOME: ${{ steps.dirty-tag.outcome }}
        run: |
          [[ "$OUTCOME" == "failure" ]]
